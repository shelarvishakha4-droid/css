<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <title>AngularJS Form Validation</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        input.ng-invalid.ng-touched {
            border: 2px solid red;
        }
        input.ng-valid.ng-touched {
            border: 2px solid green;
        }
        span {
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body ng-controller="formCtrl">

    <h2>Student Registration Form</h2>

    <form name="studentForm" novalidate>

        <!-- Name -->
        <label>Name:</label><br>
        <input type="text" name="name" ng-model="student.name" required>
        <br>
        <span ng-show="studentForm.name.$touched && studentForm.name.$invalid">
            Name is required
        </span>
        <br><br>

        <!-- Email -->
        <label>Email:</label><br>
        <input type="email" name="email" ng-model="student.email" required>
        <br>
        <span ng-show="studentForm.email.$touched && studentForm.email.$invalid">
            Enter valid email
        </span>
        <br><br>

        <!-- Age -->
        <label>Age:</label><br>
        <input type="number" name="age" ng-model="student.age" min="18" max="60" required>
        <br>
        <span ng-show="studentForm.age.$touched && studentForm.age.$invalid">
            Age must be between 18 and 60
        </span>
        <br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" ng-model="student.gender" value="Male"> Male
        <input type="radio" ng-model="student.gender" value="Female"> Female
        <br><br>

        <!-- Course -->
        <label>Course:</label><br>
        <select ng-model="student.course" required>
            <option value="">Select Course</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>
        <br><br>

        <!-- Submit -->
        <button ng-disabled="studentForm.$invalid">
            Submit
        </button>

    </form>

    <script>
        var app = angular.module("myApp", []);

        app.controller("formCtrl", function ($scope) {
            $scope.student = {};
        });
    </script>

</body>
</html>
